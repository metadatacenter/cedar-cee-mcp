<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEDAR</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    header {
      display: flex; align-items: center; gap: 1rem; padding: 0.6rem 1rem;
      background: #205493; color: #fff; position: sticky; top: 0; z-index: 10;
    }
    header .title { font-weight: 600; }
    header .spacer { flex: 1; }
    header button {
      font-size: 1rem; padding: 0.45rem 1.1rem; border: none; border-radius: 4px;
      background: #2e8540; color: #fff; cursor: pointer;
    }
    header button:disabled { background: #8aa; cursor: default; }
    #status { padding: 0.5rem 1rem; color: #444; }
    #status.error { color: #b00; font-weight: 600; }
    #editor { padding: 0 1rem 2rem; }
  </style>
</head>
<body>
<header>
  <span class="title" id="title">CEDAR</span>
  <span class="spacer"></span>
  <button id="done" hidden>Done &mdash; return to chat</button>
</header>
<div id="status">Loading the CEDAR Embeddable Editor&hellip;</div>
<div id="editor">
  <cedar-embeddable-editor></cedar-embeddable-editor>
</div>

<script>
  // The CEE web-component bundle, pinned. Primary source is the CDN; the local /cee/ path is the
  // server's vendored fallback (env CEDAR_CEE_BUNDLE) for offline / locked-down networks.
  const CEE_CDN = 'https://cdn.jsdelivr.net/npm/cedar-embeddable-editor@1.5.0/cedar-embeddable-editor.min.js';
  const CEE_LOCAL = '/cee/cedar-embeddable-editor.min.js';

  const sessionId = location.pathname.split('/')[2];
  const statusEl = document.getElementById('status');
  const doneButton = document.getElementById('done');

  function setStatus(text, isError) {
    statusEl.textContent = text;
    statusEl.className = isError ? 'error' : '';
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => reject(new Error('failed to load ' + src));
      document.head.appendChild(s);
    });
  }

  async function boot() {
    try {
      await loadScript(CEE_CDN);
    } catch (cdnError) {
      try {
        await loadScript(CEE_LOCAL);
      } catch (localError) {
        setStatus('Could not load the CEE bundle from the CDN or the local fallback. '
          + 'Check your network, or vendor the bundle and set CEDAR_CEE_BUNDLE (see README).', true);
        return;
      }
    }

    await customElements.whenDefined('cedar-embeddable-editor');

    const response = await fetch('/s/' + sessionId + '/data');
    if (!response.ok) {
      setStatus('Could not fetch session data: HTTP ' + response.status, true);
      return;
    }
    const data = await response.json();

    const templateName = (data.templateObject && data.templateObject['schema:name']) || 'CEDAR artifact';
    document.title = templateName;
    document.getElementById('title').textContent = templateName;

    const cee = document.querySelector('cedar-embeddable-editor');
    cee.config = data.config;
    if (data.instanceObject) {
      cee.templateAndInstanceObject = {
        templateObject: data.templateObject,
        instanceObject: data.instanceObject
      };
    } else {
      cee.templateObject = data.templateObject;
    }

    if (data.mode === 'FILL') {
      doneButton.hidden = false;
      setStatus('Fill in the form, then press "Done" to send the metadata back to the chat.');
    } else if (data.mode === 'VIEW_INSTANCE') {
      setStatus('Read-only view of a metadata instance.');
    } else {
      setStatus('Read-only view of a template.');
    }
  }

  doneButton.addEventListener('click', async () => {
    const cee = document.querySelector('cedar-embeddable-editor');
    const metadata = cee.currentMetadata;
    if (!metadata) {
      setStatus('The editor returned no metadata to submit.', true);
      return;
    }
    doneButton.disabled = true;
    try {
      const response = await fetch('/s/' + sessionId + '/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(metadata)
      });
      if (response.ok) {
        setStatus('Metadata sent back to the chat. You can close this tab — or edit further '
          + 'and press Done again to replace it.');
      } else {
        setStatus('Submit failed: HTTP ' + response.status + ' ' + (await response.text()), true);
      }
    } catch (e) {
      setStatus('Submit failed: ' + e.message, true);
    } finally {
      doneButton.disabled = false;
    }
  });

  boot().catch(e => setStatus('Failed to initialize: ' + e.message, true));
</script>
</body>
</html>
